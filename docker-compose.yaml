services:
    app:
        build: .
        container_name: tms_backend
        ports:
            - '4000:4000'
        depends_on:
            - redis
        env_file:
            - .env
        restart: always

    redis:
        image: redis:7-alpine
        container_name: redis_server
        ports:
            - '6379:6379'
        restart: always
